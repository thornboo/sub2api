name: dev-zz Branch Images

on:
  push:
    branches:
      - dev-zz
      - dev-zz-develop
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: sub2api

jobs:
  ghcr-amd64:
    name: Build GHCR amd64 branch image
    runs-on: ubuntu-latest
    concurrency:
      group: dev-zz-branch-image-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Verify Go version
        run: go version | grep -q 'go1.26.4'

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          branch="${GITHUB_REF_NAME//\//-}"
          short_sha="${GITHUB_SHA::8}"
          created="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          version="branch-${branch}-${short_sha}"
          image="${REGISTRY}/${owner_lc}/${IMAGE_NAME}"

          {
            echo "image=${image}"
            echo "branch=${branch}"
            echo "short_sha=${short_sha}"
            echo "created=${created}"
            echo "version=${version}"
            echo "tags<<EOF"
            echo "${image}:${branch}"
            echo "${image}:${branch}-${short_sha}"
            echo "${image}:sha-${short_sha}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build backend binary
        working-directory: backend
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT: ${{ github.sha }}
          DATE: ${{ steps.meta.outputs.created }}
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -tags embed \
            -ldflags="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.Date=${DATE} -X main.BuildType=release" \
            -o ../sub2api \
            ./cmd/server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push GHCR branch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.goreleaser
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
