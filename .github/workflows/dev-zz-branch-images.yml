name: dev-zz Branch Images

on:
  push:
    branches:
      - dev-zz
      - dev-zz-develop
  workflow_dispatch:

concurrency:
  group: dev-zz-branch-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: sub2api

jobs:
  metadata:
    name: Prepare branch image metadata
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      branch: ${{ steps.meta.outputs.branch }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      created: ${{ steps.meta.outputs.created }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          branch="${GITHUB_REF_NAME//\//-}"
          short_sha="${GITHUB_SHA::8}"
          created="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          version="branch-${branch}-${short_sha}"
          image="${REGISTRY}/${owner_lc}/${IMAGE_NAME}"

          {
            echo "image=${image}"
            echo "branch=${branch}"
            echo "short_sha=${short_sha}"
            echo "created=${created}"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"

  ghcr-arch:
    name: Build GHCR ${{ matrix.arch }} branch image
    runs-on: ubuntu-latest
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Verify Go version
        run: go version | grep -q 'go1.26.5'

      - name: Build backend binary
        working-directory: backend
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          COMMIT: ${{ github.sha }}
          DATE: ${{ needs.metadata.outputs.created }}
          GOARCH: ${{ matrix.arch }}
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=${GOARCH} go build \
            -tags embed \
            -ldflags="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.Date=${DATE} -X main.BuildType=release" \
            -o ../sub2api \
            ./cmd/server

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push GHCR branch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.goreleaser
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ needs.metadata.outputs.image }}:${{ needs.metadata.outputs.branch }}-${{ matrix.arch }}
            ${{ needs.metadata.outputs.image }}:${{ needs.metadata.outputs.branch }}-${{ needs.metadata.outputs.short_sha }}-${{ matrix.arch }}
            ${{ needs.metadata.outputs.image }}:sha-${{ needs.metadata.outputs.short_sha }}-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.metadata.outputs.version }}
            org.opencontainers.image.created=${{ needs.metadata.outputs.created }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=dev-zz-branch-image-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=dev-zz-branch-image-${{ matrix.arch }}

  ghcr-manifest:
    name: Publish GHCR multi-arch branch tags
    runs-on: ubuntu-latest
    needs:
      - metadata
      - ghcr-arch
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch branch manifests
        env:
          IMAGE: ${{ needs.metadata.outputs.image }}
          BRANCH: ${{ needs.metadata.outputs.branch }}
          SHORT_SHA: ${{ needs.metadata.outputs.short_sha }}
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:${BRANCH}" \
            -t "${IMAGE}:${BRANCH}-${SHORT_SHA}" \
            -t "${IMAGE}:sha-${SHORT_SHA}" \
            "${IMAGE}:${BRANCH}-${SHORT_SHA}-amd64" \
            "${IMAGE}:${BRANCH}-${SHORT_SHA}-arm64"
