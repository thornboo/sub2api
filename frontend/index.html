<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sub2API - AI API Gateway</title>
  </head>
  <body>
    <div id="app"></div>
    <script nonce="__CSP_NONCE_VALUE__">
      (() => {
        let rendered = false

        const reasonText = (reason) => {
          if (!reason) return 'Unknown frontend startup error.'
          if (typeof reason === 'string') return reason
          if (reason.message) return reason.message
          if (reason.reason?.message) return reason.reason.message
          if (reason.error?.message) return reason.error.message
          return String(reason)
        }

        const renderBootError = (reason) => {
          const root = document.getElementById('app')
          if (rendered || !root || root.childElementCount > 0 || root.textContent.trim()) return
          rendered = true
          console.error('[sub2api] frontend boot failed', reason)

          const shell = document.createElement('main')
          shell.className =
            'flex min-h-screen items-center justify-center bg-gray-50 px-6 text-gray-900 dark:bg-neutral-950 dark:text-white'

          const panel = document.createElement('section')
          panel.className =
            'w-full max-w-lg rounded-lg border border-gray-200 bg-white p-6 shadow-sm dark:border-neutral-800 dark:bg-neutral-900'

          const title = document.createElement('h1')
          title.className = 'text-lg font-semibold'
          title.textContent = '前端加载失败'

          const body = document.createElement('p')
          body.className = 'mt-3 break-words text-sm text-gray-600 dark:text-neutral-300'
          body.textContent = reasonText(reason)

          const action = document.createElement('button')
          action.type = 'button'
          action.className =
            'mt-5 rounded-md bg-gray-900 px-4 py-2 text-sm font-medium text-white transition hover:bg-gray-700 dark:bg-white dark:text-neutral-950 dark:hover:bg-neutral-200'
          action.textContent = '刷新页面'
          action.addEventListener('click', () => window.location.reload())

          panel.append(title, body, action)
          shell.append(panel)
          root.replaceChildren(shell)
        }

        window.addEventListener(
          'error',
          (event) => {
            const isRuntimeError = event instanceof ErrorEvent && (event.error || event.message)
            const isScriptError = event.target instanceof HTMLScriptElement
            if (isRuntimeError || isScriptError) {
              renderBootError(event.error || event.message || event)
            }
          },
          true
        )

        window.addEventListener('unhandledrejection', (event) => renderBootError(event.reason))
        window.addEventListener('sub2api:bootstrap-error', (event) =>
          renderBootError(event.detail)
        )

        window.setTimeout(() => {
          const root = document.getElementById('app')
          if (root && root.childElementCount === 0 && !root.textContent.trim()) {
            renderBootError(new Error('Frontend app did not mount within 10 seconds.'))
          }
        }, 10000)
      })()
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
